<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SIGA — Painel de Frota</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/frota.css" />
  <style>
    /* ── Fleet Summary Header ───────────────────────────────── */
    .fleet-summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    @media (max-width: 600px) {
      .fleet-summary { grid-template-columns: repeat(2, 1fr); }
    }
    .summary-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px 10px;
      text-align: center;
      transition: box-shadow .2s;
    }
    .summary-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    .summary-value {
      font-size: 1.8rem;
      font-weight: 900;
      display: block;
      line-height: 1.1;
    }
    .summary-label {
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #64748b;
      font-weight: 700;
      margin-top: 4px;
    }
    .summary-total   .summary-value { color: var(--primary); }
    .summary-ok      .summary-value { color: #16a34a; }
    .summary-maint   .summary-value { color: #7c3aed; }
    .summary-critical .summary-value { color: #dc2626; }

    /* ── Toolbar ─────────────────────────────────────────────── */
    .fleet-toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      align-items: center;
    }
    .fleet-search {
      flex: 1;
      min-width: 180px;
      padding: 10px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }
    .fleet-search:focus { border-color: var(--primary); }
    .fleet-filter {
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: .85rem;
      background: #fff;
      color: #334155;
      cursor: pointer;
      font-weight: 600;
      outline: none;
    }
    .fleet-filter:focus { border-color: var(--primary); }
    .view-toggle {
      display: flex;
      gap: 4px;
    }
    .btn-view {
      padding: 9px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: .85rem;
      font-weight: 700;
      color: #475569;
      transition: .15s;
    }
    .btn-view.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    /* ── Vehicle Cards ───────────────────────────────────────── */
    #frota-container.grid-view {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    #frota-container.list-view {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .vcard {
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: box-shadow .2s, transform .15s;
      cursor: pointer;
    }
    .vcard:hover {
      box-shadow: 0 6px 20px rgba(0,0,0,.09);
      transform: translateY(-2px);
    }
    .vcard.status-operational { border-left: 4px solid #16a34a; }
    .vcard.status-attention   { border-left: 4px solid #d97706; }
    .vcard.status-preventive_due { border-left: 4px solid #2563eb; }
    .vcard.status-in_maintenance { border-left: 4px solid #7c3aed; }
    .vcard.status-stopped     { border-left: 4px solid #dc2626; }
    .vcard.status-critical    { border-left: 4px solid #991b1b; }

    /* List view: horizontal layout */
    #frota-container.list-view .vcard {
      flex-direction: row;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
    }
    #frota-container.list-view .vcard-icon { font-size: 1.6rem; flex-shrink: 0; }
    #frota-container.list-view .vcard-main { flex: 1; min-width: 0; }
    #frota-container.list-view .vcard-kpi-row { display: none; }
    #frota-container.list-view .vcard-last-event { display: none; }
    #frota-container.list-view .vcard-actions { flex-direction: row; flex-wrap: nowrap; }

    .vcard-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .vcard-icon { font-size: 2rem; line-height: 1; }
    .vcard-id {
      font-size: .68rem;
      font-weight: 700;
      color: #64748b;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    .vcard-name {
      font-size: 1rem;
      font-weight: 800;
      color: #1e293b;
      margin: 2px 0 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .vcard-model {
      font-size: .78rem;
      color: #64748b;
      margin: 0;
    }
    .vcard-status-badge {
      padding: 4px 10px;
      border-radius: 99px;
      font-size: .72rem;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .vcard-divider {
      border: 0;
      border-top: 1px solid #f1f5f9;
      margin: 0;
    }

    /* KPI row */
    .vcard-kpi-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .vcard-kpi {
      background: #f8fafc;
      border-radius: 6px;
      padding: 7px 6px;
      text-align: center;
    }
    .vcard-kpi-val {
      display: block;
      font-size: .95rem;
      font-weight: 800;
      color: var(--primary);
    }
    .vcard-kpi-lbl {
      display: block;
      font-size: .6rem;
      text-transform: uppercase;
      letter-spacing: .4px;
      color: #94a3b8;
      font-weight: 700;
    }

    /* Last event */
    .vcard-last-event {
      background: #f8fafc;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: .78rem;
      color: #334155;
      border: 1px solid #f1f5f9;
    }
    .vcard-last-event-lbl {
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .4px;
      color: #94a3b8;
      font-weight: 700;
      margin-bottom: 3px;
    }
    .vcard-last-event-desc {
      font-weight: 600;
      color: #1e293b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .vcard-last-event-date {
      font-size: .72rem;
      color: #94a3b8;
      margin-top: 2px;
    }

    /* Actions */
    .vcard-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .vcard-actions-row {
      display: flex;
      gap: 6px;
    }
    .btn-vcard {
      flex: 1;
      padding: 8px 10px;
      border-radius: 7px;
      border: none;
      font-size: .75rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .btn-insp {
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #86efac;
    }
    .btn-insp:hover { background: #dcfce7; }
    .btn-wo {
      background: #eff6ff;
      color: #1e40af;
      border: 1px solid #bfdbfe;
    }
    .btn-wo:hover { background: #dbeafe; }
    .btn-history {
      background: var(--primary);
      color: #fff;
    }
    .btn-history:hover { opacity: .9; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #64748b;
      font-size: .95rem;
      background: #f8fafc;
      border-radius: 12px;
      border: 1px dashed #e2e8f0;
      grid-column: 1 / -1;
    }

    /* Loading skeleton */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .skeleton-card {
      background: #f8fafc;
      border-radius: 12px;
      height: 200px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .5; }
    }
  </style>
</head>
<body>
  <header class="main-header">
    <div class="header-left">
      <a href="../index.html" class="btn-back-header" title="Voltar ao Menu Principal">←</a>
      <div class="logo-container">
        <h1 style="margin:0;font-size:1.3rem;">SIGA <span style="font-size:.8rem;font-weight:normal;color:#cbd5e1;">Frota</span></h1>
      </div>
    </div>
    <div class="user-info">
      <span id="header-user" style="font-size:.9rem;font-weight:bold;">—</span>
      <div class="avatar" id="header-avatar">?</div>
    </div>
  </header>

  <nav class="main-nav">
    <a href="../index.html" class="nav-item">🏠 Início</a>
    <a href="../maquinario/maquinario.html" class="nav-item">⚙️ Maquinário</a>
    <a href="../limpeza/limpeza.html" class="nav-item">🧹 Limpeza 5S</a>
    <a href="painel-frota.html" class="nav-item active">🚛 Frota</a>
    <a href="../os/os.html" class="nav-item">📋 O.S</a>
    <a href="../compras/compras.html" class="nav-item">🛒 Compras</a>
    <a href="../os/documentos.html" class="nav-item">📄 Documentos</a>
  </nav>

  <main class="container" style="padding:0 20px 30px;">

    <!-- Page title -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px;">
      <div>
        <h2 style="color:var(--primary);margin:0;font-size:1.4rem;">Painel de Frota</h2>
        <p style="color:#64748b;margin:4px 0 0;font-size:.85rem;">Visão geral da frota em tempo real</p>
      </div>
      <a href="../os/os-detalhe.html?modo=criar&origin=fleet&tipo=maintenance"
         style="background:#8b5cf6;color:#fff;padding:10px 16px;border-radius:8px;font-weight:700;text-decoration:none;font-size:.88rem;white-space:nowrap;">
        + Nova O.S Frota
      </a>
    </div>

    <!-- Fleet Summary -->
    <div class="fleet-summary">
      <div class="summary-card summary-total">
        <span class="summary-value" id="sum-total">—</span>
        <div class="summary-label">Total Frota</div>
      </div>
      <div class="summary-card summary-ok">
        <span class="summary-value" id="sum-ok">—</span>
        <div class="summary-label">🟢 Operacional</div>
      </div>
      <div class="summary-card summary-maint">
        <span class="summary-value" id="sum-maint">—</span>
        <div class="summary-label">🔧 Manutenção</div>
      </div>
      <div class="summary-card summary-critical">
        <span class="summary-value" id="sum-critical">—</span>
        <div class="summary-label">🔴 Crítico/Parado</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="fleet-toolbar">
      <input type="search" id="fleet-search" class="fleet-search" placeholder="🔍 Buscar veículo, placa ou modelo..." />
      <select id="fleet-filter-status" class="fleet-filter">
        <option value="">Todos os Status</option>
        <option value="operational">🟢 Operacional</option>
        <option value="attention">🟡 Atenção</option>
        <option value="preventive_due">🔵 Preventiva Devida</option>
        <option value="in_maintenance">🔧 Em Manutenção</option>
        <option value="stopped">🔴 Parado</option>
        <option value="critical">⛔ Crítico</option>
      </select>
      <select id="fleet-filter-cat" class="fleet-filter">
        <option value="">Todas as Categorias</option>
      </select>
      <div class="view-toggle">
        <button id="btn-grid" class="btn-view active" title="Grade">⊞</button>
        <button id="btn-list" class="btn-view" title="Lista">≡</button>
      </div>
    </div>

    <!-- Vehicle Cards -->
    <div id="frota-container" class="grid-view">
      <!-- Skeleton loading -->
      <div class="skeleton-grid" id="skeleton-loader">
        ${Array(6).fill('<div class="skeleton-card"></div>').join('')}
      </div>
    </div>

  </main>

  <script type="module" src="../js/modules/app-painel-frota.js"></script>
</body>
</html>
