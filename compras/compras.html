<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SIGA - Pedidos de Compra</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/os.css" />
  </head>
  <body>

    <!-- CABEÇALHO -->
    <header class="main-header">
      <div class="header-left">
        <a href="../index.html" class="btn-back-header" title="Início">←</a>
        <div class="logo-container">
          <h1>SIGA</h1>
          <span>Pedidos de Compra</span>
        </div>
      </div>
      <div class="user-info">
        <span style="font-size:0.9rem;font-weight:bold">Operador</span>
        <div class="avatar">O</div>
      </div>
    </header>

    <!-- NAVEGAÇÃO GLOBAL -->
    <nav class="main-nav">
      <a href="../index.html" class="nav-item">🏠 Início</a>
      <a href="../maquinario/maquinario.html" class="nav-item">⚙️ Maquinário</a>
      <a href="../frota/painel-frota.html" class="nav-item">🚛 Frota</a>
      <a href="../limpeza/limpeza.html" class="nav-item">🧹 Limpeza 5S</a>
      <a href="../os/os.html" class="nav-item">📋 O.S</a>
      <a href="compras.html" class="nav-item active">🛒 Compras</a>
      <a href="../os/documentos.html" class="nav-item">📄 Documentos</a>
    </nav>

    <main class="container">

      <!-- CABEÇALHO DA PÁGINA -->
      <div class="page-header">
        <h2>Central de Compras</h2>
        <a href="compra-detalhe.html?modo=criar" class="btn-nova-os">+ Novo Pedido</a>
      </div>

      <!-- STATS -->
      <div class="stats-bar">
        <div class="stat-card">
          <span class="stat-valor" id="stat-total">—</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-card andamento">
          <span class="stat-valor" id="stat-pendente">—</span>
          <span class="stat-label">Pendentes</span>
        </div>
        <div class="stat-card aberta">
          <span class="stat-valor" id="stat-aprovado">—</span>
          <span class="stat-label">Aprovados</span>
        </div>
        <div class="stat-card concluida">
          <span class="stat-valor" id="stat-recebido">—</span>
          <span class="stat-label">Recebidos</span>
        </div>
      </div>

      <!-- FILTROS POR CATEGORIA -->
      <div class="filtros-container">
        <span class="filtro-label">Categoria:</span>
        <div class="filtro-grupo" id="filtros-categoria">
          <button class="btn-filtro ativo" data-filtro-categoria="todos">Todos</button>
          <button class="btn-filtro" data-filtro-categoria="peca">🔩 Peça</button>
          <button class="btn-filtro" data-filtro-categoria="equipamento">⚙️ Equipamento</button>
          <button class="btn-filtro" data-filtro-categoria="servico">🛠️ Serviço</button>
          <button class="btn-filtro" data-filtro-categoria="operacional">📦 Operacional</button>
        </div>
        <div class="divisor-filtro"></div>
        <span class="filtro-label">Status:</span>
        <div class="filtro-grupo" id="filtros-status">
          <button class="btn-filtro ativo" data-filtro-status="todos">Todos</button>
          <button class="btn-filtro" data-filtro-status="pending">Pendente</button>
          <button class="btn-filtro" data-filtro-status="approved">Aprovado</button>
          <button class="btn-filtro" data-filtro-status="ordered">Pedido Feito</button>
          <button class="btn-filtro" data-filtro-status="received">Recebido</button>
          <button class="btn-filtro" data-filtro-status="cancelled">Cancelado</button>
        </div>
      </div>

      <!-- LISTA DE PEDIDOS -->
      <div id="compras-lista" class="os-lista">
        <!-- Preenchido via JS -->
      </div>

    </main>

    <!-- LOADING -->
    <div id="overlay" class="overlay">
      <div class="overlay-content">
        <div class="spinner"></div>
        <p>Carregando Pedidos de Compra...</p>
      </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast"></div>

    <script type="module" src="../js/modules/app-compras.js"></script>
  </body>
</html>
