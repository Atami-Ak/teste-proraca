<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIGA — Redirecionando...</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding: 20px;
    }

    .redirect-card {
      background: #1e293b;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 40px 48px;
      max-width: 440px;
    }

    .redirect-icon { font-size: 3rem; margin-bottom: 12px; }

    h1 {
      font-size: 1.25rem;
      font-weight: 800;
      color: #f1f5f9;
      margin: 0 0 8px;
    }

    p {
      font-size: 0.9rem;
      color: #94a3b8;
      margin: 0 0 24px;
      line-height: 1.6;
    }

    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      padding: 11px 22px;
      border-radius: 9px;
      font-weight: 700;
      font-size: 0.9rem;
      transition: background 0.15s;
    }

    a:hover { background: #2563eb; }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(59,130,246,0.3);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="redirect-card">
    <div class="redirect-icon">🏷️</div>
    <h1>Sistema Unificado de Ativos</h1>
    <p>
      O módulo de Maquinário foi incorporado ao novo sistema de
      <strong>Gestão de Ativos Patrimoniais</strong>.
      <br><br>
      Todas as máquinas estão cadastradas como ativos da categoria
      <strong>Maquinário Industrial (MAQ)</strong>.
    </p>
    <div class="spinner" id="spin"></div>
    <a href="../ativos/ativos.html?cat=MAQ" id="link">
      🏷️ Ir para Gestão de Ativos
    </a>
  </div>

  <script>
    // Auto-redirect after 2.5s
    setTimeout(() => {
      window.location.replace('../ativos/ativos.html?cat=MAQ');
    }, 2500);
  </script>
</body>
</html>
